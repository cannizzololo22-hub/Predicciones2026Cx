<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prode Mundial 2026 - Familia</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #10b981;
            --dark-bg: #0b0f19;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--dark-bg); color: var(--text-main); min-height: 100vh; }

        /* Pantalla de Entrada */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e3a8a 0%, var(--dark-bg) 100%);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .login-box {
            background: var(--card-bg); padding: 2.5rem; border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); text-align: center; max-width: 420px; width: 90%; border: 1px solid #334155;
        }
        .login-box h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .login-box p { color: var(--text-muted); margin-bottom: 2rem; font-size: 1rem; }
        .login-box input {
            width: 100%; padding: 0.9rem; margin-bottom: 1.5rem;
            border: 2px solid #334155; background: #0f172a; color: white;
            border-radius: 8px; font-size: 1.2rem; text-align: center; outline: none;
        }
        .login-box button {
            background: var(--secondary); color: white; border: none;
            padding: 1rem; font-size: 1.2rem; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%;
        }

        /* Interfaz Principal */
        #main-interface { display: none; padding: 2rem; max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 1.5rem; border-bottom: 1px solid #334155; margin-bottom: 2rem; }
        .clock-bar { font-size: 1rem; color: #fff; background: #1e293b; padding: 0.5rem 1rem; border-radius: 8px; font-weight: bold; border: 1px solid #334155; }

        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; }
        @media (max-width: 1024px) { .grid { grid-template-columns: 1fr; } }

        .panel { background: var(--card-bg); border-radius: 14px; padding: 1.5rem; border: 1px solid #334155; margin-bottom: 2rem; }
        .panel h3 { font-size: 1.4rem; margin-bottom: 1.5rem; border-left: 5px solid var(--primary); padding-left: 0.6rem; }

        /* Estructura del Fixture Claro */
        .fase-bloque { margin-top: 2.5rem; }
        .fase-nombre { background: linear-gradient(90deg, #1e3a8a, #2563eb); padding: 1rem; font-weight: bold; border-radius: 8px; margin-bottom: 1.2rem; color: #fff; font-size: 1.3rem; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .partido-fila { display: flex; justify-content: space-between; align-items: center; background: #0f172a; padding: 1.2rem; border-radius: 10px; margin-bottom: 0.8rem; border: 1px solid #1e293b; }
        .partido-meta { font-size: 0.9rem; color: var(--text-muted); width: 120px; line-height: 1.5; font-weight: bold; }
        .partido-equipos { flex-grow: 1; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; }
        .equipo-bloque { display: flex; align-items: center; gap: 12px; width: 43%; font-size: 1.15rem; font-weight: bold; }
        .equipo-bloque.local { justify-content: flex-end; text-align: right; }
        .equipo-bloque.visitante { justify-content: flex-start; text-align: left; }
        .vs-label { color: var(--text-muted); font-size: 0.9rem; font-weight: bold; width: 14%; text-align: center; background: #1e293b; padding: 0.2rem 0.5rem; border-radius: 4px; }
        
        .partido-inputs { display: flex; align-items: center; gap: 8px; }
        .partido-inputs input { width: 55px; height: 45px; text-align: center; background: #1e293b; border: 2px solid #475569; color: white; font-size: 1.4rem; font-weight: bold; border-radius: 8px; outline: none; }
        .partido-inputs input:focus { border-color: var(--secondary); }

        .ranking-table { width: 100%; border-collapse: collapse; font-size: 1.1rem; }
        .ranking-table th, .ranking-table td { padding: 0.9rem; text-align: left; border-bottom: 1px solid #334155; }
        .btn-submit { background: #10b981; color: white; border: none; padding: 1.3rem; font-size: 1.3rem; font-weight: bold; border-radius: 8px; width: 100%; cursor: pointer; margin-top: 1.5rem; position: sticky; bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); transition: background 0.2s; }
        .btn-submit:hover { background: #059669; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1>🏆 Prode Familiar 2026</h1>
            <p>Ingresá tu nombre o apodo para empezar:</p>
            <input type="text" id="player-name" placeholder="Ej: Juan, Mamá, Tío...">
            <button onclick="entrarAlEstadio()">¡Entrar a Jugar!</button>
        </div>
    </div>

    <div id="main-interface">
        <header>
            <div>
                <h2>Fixture de la Fase Final</h2>
                <div class="clock-bar" id="live-clock">Cargando hora...</div>
            </div>
            <div style="background: #2563eb; padding: 0.6rem 1.5rem; border-radius: 20px; font-weight: bold; font-size: 1.2rem;" id="user-display"></div>
        </header>

        <div class="grid">
            <main>
                <div class="panel">
                    <h3>✍️ Anotás tus resultados acá abajo:</h3>
                    <div id="fixture-container"></div>
                    <button class="btn-submit" onclick="guardarProde()">💾 GUARDAR MIS RESULTADOS</button>
                </div>
            </main>

            <aside>
                <div class="panel">
                    <h3>⭐ Tabla de Posiciones</h3>
                    <table class="ranking-table">
                        <thead><tr><th>Pos</th><th>Nombre</th><th>Puntos</th></tr></thead>
                        <tbody id="ranking-rows"></tbody>
                    </table>
                </div>
            </aside>
        </div>
    </div>

    <script>
        // LISTA DE PARTIDOS CON PAÍSES REALES Y BANDERAS CLARAS
        const multiWebsMatches = [
            // === DIECISEISAVOS DE FINAL ===
            { id: "p1", fase: "Dieciseisavos de Final", local: "Argentina 🇦🇷", visitante: "Cabo Verde 🇨🇻", fecha: "03 Jul", hora: "19:00" },
            { id: "p2", fase: "Dieciseisavos de Final", local: "Colombia 🇨🇴", visitante: "Ghana 🇬🇭", fecha: "03 Jul", hora: "22:00" },
            { id: "p3", fase: "Dieciseisavos de Final", local: "Estados Unidos 🇺🇸", visitante: "Uruguay 🇺🇾", fecha: "28 Jun", hora: "16:00" },
            { id: "p4", fase: "Dieciseisavos de Final", local: "México 🇲🇽", visitante: "Arabia Saudita 🇸🇦", fecha: "28 Jun", hora: "20:00" },
            { id: "p5", fase: "Dieciseisavos de Final", local: "Canadá 🇨🇦", visitante: "Ecuador 🇪🇨", fecha: "29 Jun", hora: "15:00" },
            { id: "p6", fase: "Dieciseisavos de Final", local: "Alemania 🇩🇪", visitante: "Argelia 🇩🇿", fecha: "29 Jun", hora: "19:00" },
            { id: "p7", fase: "Dieciseisavos de Final", local: "Bélgica 🇧🇪", visitante: "Corea del Sur 🇰🇷", fecha: "29 Jun", hora: "22:00" },
            { id: "p8", fase: "Dieciseisavos de Final", local: "Brasil 🇧🇷", visitante: "Ucrania 🇺🇦", fecha: "30 Jun", hora: "14:00" },
            { id: "p9", fase: "Dieciseisavos de Final", local: "Chile 🇨🇱", visitante: "Polonia 🇵🇱", fecha: "30 Jun", hora: "18:00" },
            { id: "p10", fase: "Dieciseisavos de Final", local: "Francia 🇫🇷", visitante: "Egipto 🇪🇬", fecha: "30 Jun", hora: "21:00" },
            { id: "p11", fase: "Dieciseisavos de Final", local: "Países Bajos 🇳🇱", visitante: "Perú 🇵🇪", fecha: "01 Jul", hora: "15:00" },
            { id: "p12", fase: "Dieciseisavos de Final", local: "España 🇪🇦", visitante: "Túnez 🇹🇳", fecha: "01 Jul", hora: "19:00" },
            { id: "p13", fase: "Dieciseisavos de Final", local: "Italia 🇮🇹", visitante: "Camerún 🇨🇲", fecha: "01 Jul", hora: "22:00" },
            { id: "p14", fase: "Dieciseisavos de Final", local: "Portugal 🇵🇹", visitante: "Australia 🇦🇺", fecha: "02 Jul", hora: "14:00" },
            { id: "p15", fase: "Dieciseisavos de Final", local: "Marruecos 🇲🇦", visitante: "Japón 🇯🇵", fecha: "02 Jul", hora: "18:00" },
            { id: "p16", fase: "Dieciseisavos de Final", local: "Inglaterra 🏴󠁧󠁢󠁥󠁮󠁧󠁿", visitante: "Suiza 🇨🇭", fecha: "02 Jul", hora: "21:00" },

            // === OCTAVOS DE FINAL ===
            { id: "p17", fase: "Octavos de Final", local: "Ganador [Argentina / Cabo Verde]", visitante: "Ganador [Colombia / Ghana]", fecha: "11 Jul", hora: "14:00" },
            { id: "p18", fase: "Octavos de Final", local: "Ganador [EE.UU. / Uruguay]", visitante: "Ganador [México / Arabia]", fecha: "11 Jul", hora: "18:00" },
            { id: "p19", fase: "Octavos de Final", local: "Ganador [Canadá / Ecuador]", visitante: "Ganador [Alemania / Argelia]", fecha: "11 Jul", hora: "21:00" },
            { id: "p20", fase: "Octavos de Final", local: "Ganador [Bélgica / Corea del Sur]", visitante: "Ganador [Brasil / Ucrania]", fecha: "12 Jul", hora: "15:00" },
            { id: "p21", fase: "Octavos de Final", local: "Ganador [Chile / Polonia]", visitante: "Ganador [Francia / Egipto]", fecha: "12 Jul", hora: "19:00" },
            { id: "p22", fase: "Octavos de Final", local: "Ganador [Países Bajos / Perú]", visitante: "Ganador [España / Túnez]", fecha: "12 Jul", hora: "22:00" },
            { id: "p23", fase: "Octavos de Final", local: "Ganador [Italia / Camerún]", visitante: "Ganador [Portugal / Australia]", fecha: "13 Jul", hora: "14:00" },
            { id: "p24", fase: "Octavos de Final", local: "Ganador [Marruecos / Japón]", visitante: "Ganador [Inglaterra / Suiza]", fecha: "13 Jul", hora: "18:00" },

            // === CUARTOS DE FINAL ===
            { id: "p25", fase: "Cuartos de Final", local: "Ganador Octavos Partido 17", visitante: "Ganador Octavos Partido 18", fecha: "18 Jul", hora: "14:00" },
            { id: "p26", fase: "Cuartos de Final", local: "Ganador Octavos Partido 19", visitante: "Ganador Octavos Partido 20", fecha: "18 Jul", hora: "18:00" },
            { id: "p27", fase: "Cuartos de Final", local: "Ganador Octavos Partido 21", visitante: "Ganador Octavos Partido 22", fecha: "19 Jul", hora: "15:00" },
            { id: "p28", fase: "Cuartos de Final", local: "Ganador Octavos Partido 23", visitante: "Ganador Octavos Partido 24", fecha: "19 Jul", hora: "19:00" },

            // === SEMIFINALES ===
            { id: "p29", fase: "Semifinales", local: "Ganador Cuartos Partido 25", visitante: "Ganador Cuartos Partido 26", fecha: "24 Jul", hora: "16:00" },
            { id: "p30", fase: "Semifinales", local: "Ganador Cuartos Partido 27", visitante: "Ganador Cuartos Partido 28", fecha: "24 Jul", hora: "20:00" },

            // === FINALES ===
            { id: "p31", fase: "Partido por el 3er Puesto 🥉", local: "Perdedor Semifinal 1", visitante: "Perdedor Semifinal 2", fecha: "28 Jul", hora: "16:00" },
            { id: "p32", fase: "¡Gran Final del Mundial! 🏆", local: "Ganador Semifinal 1", visitante: "Ganador Semifinal 2", fecha: "29 Jul", hora: "17:00" }
        ];

        let clienteActual = "";

        if (!localStorage.getItem('prode_familiar_2026')) {
            localStorage.setItem('prode_familiar_2026', JSON.stringify({}));
        }

        setInterval(() => {
            const ahora = new Date();
            document.getElementById('live-clock').innerText = `🕒 Hora actual: ${ahora.toLocaleTimeString()}`;
        }, 1000);

        function entrarAlEstadio() {
            const alias = document.getElementById('player-name').value.trim().toUpperCase();
            if (!alias) return alert("Por favor, ingresá tu nombre para empezar.");
            clienteActual = alias;
            document.getElementById('user-display').innerText = `👤 Participante: ${clienteActual}`;

            let DB = JSON.parse(localStorage.getItem('prode_familiar_2026'));
            if (!DB[clienteActual]) {
                DB[clienteActual] = { pronosticos: {} };
                localStorage.setItem('prode_familiar_2026', JSON.stringify(DB));
            }

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-interface').style.display = 'block';
            renderizarFixture();
        }

        function renderizarFixture() {
            const fixtureContainer = document.getElementById('fixture-container');
            fixtureContainer.innerHTML = "";

            let DB = JSON.parse(localStorage.getItem('prode_familiar_2026'));
            let misPredicciones = DB[clienteActual]?.pronosticos || {};
            let fasesMap = {};

            multiWebsMatches.forEach(match => {
                if (!fasesMap[match.fase]) fasesMap[match.fase] = [];
                fasesMap[match.fase].push(match);
            });

            const ordenFases = [
                "Dieciseisavos de Final",
                "Octavos de Final",
                "Cuartos de Final",
                "Semifinales",
                "Partido por el 3er Puesto 🥉",
                "¡Gran Final del Mundial! 🏆"
            ];

            ordenFases.forEach(fase => {
                if (!fasesMap[fase]) return;
                let divFase = `<div class="fase-bloque"><div class="fase-nombre">${fase}</div>`;
                
                fasesMap[fase].forEach(match => {
                    const lVal = misPredicciones[match.id]?.l || "";
                    const vVal = misPredicciones[match.id]?.v || "";

                    divFase += `
                        <div class="partido-fila">
                            <div class="partido-meta">📅 ${match.fecha}<br>⏰ ${match.hora} HS</div>
                            <div class="partido-equipos">
                                <div class="equipo-bloque local">${match.local}</div>
                                <span class="vs-label">VS</span>
                                <div class="equipo-bloque visitante">${match.visitante}</div>
                            </div>
                            <div class="partido-inputs">
                                <input type="number" min="0" id="gl-${match.id}" value="${lVal}">
                                <span>-</span>
                                <input type="number" min="0" id="gv-${match.id}" value="${vVal}">
                            </div>
                        </div>
                    `;
                });
                divFase += `</div>`;
                fixtureContainer.innerHTML += divFase;
            });

            actualizarLeaderboard();
        }

        function guardarProde() {
            let DB = JSON.parse(localStorage.getItem('prode_familiar_2026'));

            multiWebsMatches.forEach(match => {
                const inputL = document.getElementById(`gl-${match.id}`).value;
                const inputV = document.getElementById(`gv-${match.id}`).value;

                if (inputL !== "" && inputV !== "") {
                    DB[clienteActual].pronosticos[match.id] = {
                        l: parseInt(inputL),
                        v: parseInt(inputV)
                    };
                }
            });

            localStorage.setItem('prode_familiar_2026', JSON.stringify(DB));
            alert("✅ ¡Tus resultados se guardaron correctamente!");
            renderizarFixture();
        }

        function actualizarLeaderboard() {
            let DB = JSON.parse(localStorage.getItem('prode_familiar_2026'));
            const containerTabla = document.getElementById('ranking-rows');
            containerTabla.innerHTML = "";
            
            let i = 1;
            for (const nombreAmigo in DB) {
                const esPropio = nombreAmigo === clienteActual ? 'style="color: var(--secondary); font-weight: bold;"' : '';
                containerTabla.innerHTML += `
                    <tr ${esPropio}>
                        <td>${i++}</td>
                        <td>${nombreAmigo}</td>
                        <td>0 Pts</td>
                    </tr>
                `;
            }
        }
    </script>
</body>
</html>
