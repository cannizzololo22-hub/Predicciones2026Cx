<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prode Mundial 2026 - Familia</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #10b981;
            --dark-bg: #0b0f19;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        body { background-color: var(--dark-bg); color: var(--text-main); min-height: 100vh; }

        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e3a8a 0%, var(--dark-bg) 100%);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .login-box {
            background: var(--card-bg); padding: 2.5rem; border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); text-align: center; max-width: 420px; width: 90%; border: 1px solid #334155;
        }
        .login-box h1 { font-size: 2rem; margin-bottom: 0.5rem; }
        .login-box p { color: var(--text-muted); margin-bottom: 1.5rem; font-size: 1rem; }
        .login-box input {
            width: 100%; padding: 0.9rem; margin-bottom: 1rem;
            border: 2px solid #334155; background: #0f172a; color: white;
            border-radius: 8px; font-size: 1.1rem; text-align: center; outline: none;
        }
        .login-box button {
            background: var(--secondary); color: white; border: none;
            padding: 1rem; font-size: 1.2rem; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; margin-top: 0.5rem;
        }
        .login-box button:disabled {
            background: #475569; cursor: not-allowed;
        }

        #main-interface { display: none; padding: 2rem; max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 1.5rem; border-bottom: 1px solid #334155; margin-bottom: 2rem; }
        .clock-bar { font-size: 1rem; color: #fff; background: #1e293b; padding: 0.5rem 1rem; border-radius: 8px; font-weight: bold; border: 1px solid #334155; }

        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; }
        @media (max-width: 1024px) { .grid { grid-template-columns: 1fr; } }

        .panel { background: var(--card-bg); border-radius: 14px; padding: 1.5rem; border: 1px solid #334155; margin-bottom: 2rem; }
        .panel h3 { font-size: 1.4rem; margin-bottom: 1.5rem; border-left: 5px solid var(--primary); padding-left: 0.6rem; }

        .fase-bloque { margin-top: 2.5rem; }
        .fase-nombre { background: linear-gradient(90deg, #1e3a8a, #2563eb); padding: 1rem; font-weight: bold; border-radius: 8px; margin-bottom: 1.2rem; color: #fff; font-size: 1.3rem; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .partido-fila { display: flex; justify-content: space-between; align-items: center; background: #0f172a; padding: 1.2rem; border-radius: 10px; margin-bottom: 0.8rem; border: 1px solid #1e293b; }
        .partido-fila.jugado { border-left: 5px solid #64748b; opacity: 0.85; }
        .partido-meta { font-size: 0.9rem; color: var(--text-muted); width: 120px; line-height: 1.5; font-weight: bold; }
        .partido-equipos { flex-grow: 1; padding: 0 20px; display: flex; align-items: center; justify-content: space-between; }
        .equipo-bloque { display: flex; align-items: center; gap: 12px; width: 43%; font-size: 1.15rem; font-weight: bold; }
        .equipo-bloque.local { justify-content: flex-end; text-align: right; }
        .equipo-bloque.visitante { justify-content: flex-start; text-align: left; }
        .vs-label { color: var(--text-muted); font-size: 0.9rem; font-weight: bold; width: 14%; text-align: center; background: #1e293b; padding: 0.2rem 0.5rem; border-radius: 4px; }
        
        .partido-inputs { display: flex; align-items: center; gap: 8px; }
        .partido-inputs input { width: 55px; height: 45px; text-align: center; background: #1e293b; border: 2px solid #475569; color: white; font-size: 1.4rem; font-weight: bold; border-radius: 8px; outline: none; }
        .partido-inputs input:focus { border-color: var(--secondary); }
        .partido-inputs input:disabled { background: #334155; border-color: #475569; color: #cbd5e1; cursor: not-allowed; }
        .penales-label { font-size: 0.8rem; color: #f59e0b; display: block; text-align: center; font-weight: bold; margin-top: 2px;}

        .ranking-table { width: 100%; border-collapse: collapse; font-size: 1.1rem; }
        .ranking-table th, .ranking-table td { padding: 0.9rem; text-align: left; border-bottom: 1px solid #334155; }
        .btn-submit { background: #10b981; color: white; border: none; padding: 1.3rem; font-size: 1.3rem; font-weight: bold; border-radius: 8px; width: 100%; cursor: pointer; margin-top: 1.5rem; position: sticky; bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); transition: background 0.2s; }
        .btn-submit:hover { background: #059669; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 0.3rem 0.8rem; font-size: 0.9rem; border-radius: 6px; cursor: pointer; margin-top: 5px; font-weight: bold;}
        #login-msg { margin-top: 10px; font-weight: bold; color: #f59e0b; font-size: 0.95rem; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1>🏆 Prode Familiar Segurizado</h1>
            <p>Ingresá para registrar o cargar tus predicciones:</p>
            <input type="text" id="player-name" placeholder="Tu Nombre (Ej: Mamá, Juan)">
            <input type="password" id="player-pass" placeholder="Tu Contraseña Secreta">
            <button id="btn-login" onclick="procesarLogin()">¡Entrar a Jugar!</button>
            <div id="login-msg"></div>
        </div>
    </div>

    <div id="main-interface">
        <header>
            <div>
                <h2>Camino a la Final Oficial</h2>
                <div class="clock-bar" id="live-clock">Cargando hora...</div>
            </div>
            <div style="text-align: right;">
                <div style="background: #2563eb; padding: 0.6rem 1.5rem; border-radius: 20px; font-weight: bold; font-size: 1.2rem;" id="user-display"></div>
                <button class="logout-btn" onclick="cerrarSesion()">Salir / Cambiar de Cuenta</button>
            </div>
        </header>

        <div class="grid">
            <main>
                <div class="panel">
                    <h3>✍️ Completá los partidos disponibles:</h3>
                    <p style="color: var(--text-muted); font-size: 0.95rem; margin-bottom: 1rem;">* Los resultados bloqueados ya están consolidados por DIRECTV Sports.</p>
                    <div id="fixture-container"></div>
                    <button class="btn-submit" id="btn-save" onclick="guardarProde()">💾 GUARDAR MIS RESULTADOS</button>
                </div>
            </main>

            <aside>
                <div class="panel">
                    <h3>⭐ Tabla General de la Familia</h3>
                    <table class="ranking-table">
                        <thead><tr><th>Pos</th><th>Nombre</th><th>Puntos</th></tr></thead>
                        <tbody id="ranking-rows"></tbody>
                    </table>
                </div>
            </aside>
        </div>
    </div>

    <script>
        const multiWebsMatches = [
            // --- LLAVE IZQUIERDA ---
            { id: "p1", fase: "Dieciseisavos de Final", local: "Alemania 🇩🇪", visitante: "Paraguay 🇵🇾", realL: 1, realV: 1, penales: "Pasó PAR (P)", yaJugado: true },
            { id: "p2", fase: "Dieciseisavos de Final", local: "Francia 🇫🇷", visitante: "Suecia 🇸🇪", realL: 3, realV: 0, yaJugado: true },
            { id: "p3", fase: "Dieciseisavos de Final", local: "Sudáfrica 🇿🇦", visitante: "Canadá 🇨🇦", realL: 0, realV: 1, yaJugado: true },
            { id: "p4", fase: "Dieciseisavos de Final", local: "Países Bajos 🇳🇱", visitante: "Marruecos 🇲🇦", realL: 1, realV: 1, penales: "Pasó MAR (P)", yaJugado: true },
            { id: "p5", fase: "Dieciseisavos de Final", local: "Portugal 🇵🇹", visitante: "Croacia 🇭🇷", realL: 2, realV: 1, yaJugado: true },
            { id: "p6", fase: "Dieciseisavos de Final", local: "España 🇪🇸", visitante: "Austria 🇦🇹", realL: 3, realV: 0, yaJugado: true },
            { id: "p7", fase: "Dieciseisavos de Final", local: "Estados Unidos 🇺🇸", visitante: "Bosnia 🇧🇦", realL: 2, realV: 0, yaJugado: true },
            { id: "p8", fase: "Dieciseisavos de Final", local: "Bélgica 🇧🇪", visitante: "Senegal 🇸🇳", realL: 3, realV: 2, yaJugado: true },

            // --- LLAVE DERECHA ---
            { id: "p9", fase: "Dieciseisavos de Final", local: "Brasil 🇧🇷", visitante: "Japón 🇯🇵", realL: 2, realV: 1, yaJugado: true },
            { id: "p10", fase: "Dieciseisavos de Final", local: "Costa de Marfil 🇨🇮", visitante: "Noruega 🇳🇴", realL: 1, realV: 2, yaJugado: true },
            { id: "p11", fase: "Dieciseisavos de Final", local: "México 🇲🇽", visitante: "Ecuador 🇪🇨", realL: 2, realV: 0, yaJugado: true },
            { id: "p12", fase: "Dieciseisavos de Final", local: "Inglaterra 🏴󠁧󠁢󠁥󠁮󠁧󠁿", visitante: "Rep. Dem. Congo 🇨🇩", realL: 2, realV: 1, yaJugado: true },
            { id: "p13", fase: "Dieciseisavos de Final", local: "Argentina 🇦🇷", visitante: "Cabo Verde 🇨🇻", yaJugado: false },
            { id: "p14", fase: "Dieciseisavos de Final", local: "Australia 🇦🇺", visitante: "Egipto 🇪🇬", yaJugado: false },
            { id: "p15", fase: "Dieciseisavos de Final", local: "Suiza 🇨🇭", visitante: "Argelia 🇩🇿", realL: 2, realV: 0, yaJugado: true },
            { id: "p16", fase: "Dieciseisavos de Final", local: "Colombia 🇨🇴", visitante: "Ghana 🇬🇭", yaJugado: false },

            // --- OCTAVOS DE FINAL ---
            { id: "p17", fase: "Octavos de Final", local: "Paraguay 🇵🇾", visitante: "Francia 🇫🇷", yaJugado: false },
            { id: "p18", fase: "Octavos de Final", local: "Canadá 🇨🇦", visitante: "Marruecos 🇲🇦", yaJugado: false },
            { id: "p19", fase: "Octavos de Final", local: "Portugal 🇵🇹", visitante: "España 🇪🇸", yaJugado: false },
            { id: "p20", fase: "Octavos de Final", local: "Estados Unidos 🇺🇸", visitante: "Bélgica 🇧🇪", yaJugado: false },
            { id: "p21", fase: "Octavos de Final", local: "Brasil 🇧🇷", visitante: "Noruega 🇳🇴", yaJugado: false },
            { id: "p22", fase: "Octavos de Final", local: "México 🇲🇽", visitante: "Inglaterra 🏴󠁧󠁢󠁥󠁮󠁧󠁿", yaJugado: false },
            { id: "p23", fase: "Octavos de Final", local: "Ganador [Argentina / C. Verde]", visitante: "Ganador [Australia / Egipto]", yaJugado: false },
            { id: "p24", fase: "Octavos de Final", local: "Suiza 🇨🇭", visitante: "Ganador [Colombia / Ghana]", yaJugado: false },

            // FASES FINALES
            { id: "p25", fase: "Cuartos de Final", local: "Ganador Octavos 17", visitante: "Ganador Octavos 18", yaJugado: false },
            { id: "p26", fase: "Cuartos de Final", local: "Ganador Octavos 19", visitante: "Ganador Octavos 20", yaJugado: false },
            { id: "p27", fase: "Cuartos de Final", local: "Ganador Octavos 21", visitante: "Ganador Octavos 22", yaJugado: false },
            { id: "p28", fase: "Cuartos de Final", local: "Ganador Octavos 23", visitante: "Ganador Octavos 24", yaJugado: false },
            { id: "p29", fase: "Semifinales", local: "Ganador Cuartos 25", visitante: "Ganador Cuartos 26", yaJugado: false },
            { id: "p30", fase: "Semifinales", local: "Ganador Cuartos 27", visitante: "Ganador Cuartos 28", yaJugado: false },
            { id: "p32", fase: "¡Gran Final del Mundial! 🏆", local: "Ganador Semifinal 1", visitante: "Ganador Semifinal 2", yaJugado: false }
        ];

        const DB_URL = "https://kvdb.io/MN9vC63w1g6L3rN96WdF7a/prode_final_seguro_v15";
        let clienteActual = "";
        let passwordActual = "";
        let baseDeDatosCompleta = {};

        window.onload = async function() {
            setInterval(() => {
                const ahora = new Date();
                document.getElementById('live-clock').innerText = `🕒 Hora actual: ${ahora.toLocaleTimeString()}`;
            }, 1000);

            const userGuardado = localStorage.getItem('prode_secure_user');
            const passGuardado = localStorage.getItem('prode_secure_pass');
            
            if (userGuardado && passGuardado) {
                clienteActual = userGuardado.toUpperCase();
                passwordActual = passGuardado;
                
                document.getElementById('login-msg').innerText = "⏳ Conectando automáticamente...";
                await descargarDatos();
                ejecutarAccesoValido();
            }
        }

        async function descargarDatos() {
            try {
                let respuesta = await fetch(DB_URL);
                if (respuesta.ok) {
                    let texto = await respuesta.text();
                    // Si la BD devuelve texto vacío o no es un JSON válido, inicializa un objeto limpio
                    baseDeDatosCompleta = texto ? JSON.parse(texto) : {};
                } else {
                    baseDeDatosCompleta = {};
                }
            } catch (e) {
                baseDeDatosCompleta = {};
            }
        }

        async function subirDatos() {
            try {
                await fetch(DB_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(baseDeDatosCompleta)
                });
            } catch (e) {
                console.error("Error al guardar en la nube", e);
            }
        }

        async function procesarLogin() {
            const alias = document.getElementById('player-name').value.trim().toUpperCase();
            const pass = document.getElementById('player-pass').value.trim();

            if (!alias || !pass) return alert("Por favor completá tu Nombre y Contraseña.");

            const btn = document.getElementById('btn-login');
            btn.disabled = true;
            document.getElementById('login-msg').innerText = "🔒 Validando con la base de datos...";

            await descargarDatos();

            if (baseDeDatosCompleta[alias]) {
                if (baseDeDatosCompleta[alias].password !== pass) {
                    alert("❌ Error: Contraseña incorrecta para este usuario.");
                    document.getElementById('login-msg').innerText = "";
                    btn.disabled = false;
                    return;
                }
            } else {
                // Registro por primera vez
                baseDeDatosCompleta[alias] = {
                    password: pass,
                    pronosticos: {}
                };
                await subirDatos();
            }

            clienteActual = alias;
            passwordActual = pass;
            localStorage.setItem('prode_secure_user', clienteActual);
            localStorage.setItem('prode_secure_pass', passwordActual);

            ejecutarAccesoValido();
        }

        function ejecutarAccesoValido() {
            document.getElementById('user-display').innerText = `👤 Usuario: ${clienteActual}`;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-interface').style.display = 'block';
            renderizarFixture();
        }

        function renderizarFixture() {
            const fixtureContainer = document.getElementById('fixture-container');
            fixtureContainer.innerHTML = "";

            let misPredicciones = baseDeDatosCompleta[clienteActual]?.pronosticos || {};
            let fasesMap = {};

            multiWebsMatches.forEach(match => {
                if (!fasesMap[match.fase]) fasesMap[match.fase] = [];
                fasesMap[match.fase].push(match);
            });

            const ordenFases = ["Dieciseisavos de Final", "Octavos de Final", "Cuartos de Final", "Semifinales", "¡Gran Final del Mundial! 🏆"];

            ordenFases.forEach(fase => {
                if (!fasesMap[fase]) return;
                let divFase = `<div class="fase-bloque"><div class="fase-nombre">${fase}</div>`;
                
                fasesMap[fase].forEach(match => {
                    const lVal = match.yaJugado ? match.realL : (misPredicciones[match.id]?.l ?? "");
                    const vVal = match.yaJugado ? match.realV : (misPredicciones[match.id]?.v ?? "");
                    const disableAttr = match.yaJugado ? "disabled" : "";
                    const claseFila = match.yaJugado ? "partido-fila jugado" : "partido-fila";
                    const textoMeta = match.yaJugado ? "✅ FINALIZADO" : "⏳ PENDIENTE";
                    const infoPenales = match.penales ? `<span class="penales-label">${match.penales}</span>` : "";

                    divFase += `
                        <div class="${claseFila}">
                            <div class="partido-meta">📺 DIRECTV<br>${textoMeta}</div>
                            <div class="partido-equipos">
                                <div class="equipo-bloque local">${match.local}</div>
                                <span class="vs-label">VS</span>
                                <div class="equipo-bloque visitante">${match.visitante}</div>
                            </div>
                            <div>
                                <div class="partido-inputs">
                                    <input type="number" min="0" id="gl-${match.id}" value="${lVal}" ${disableAttr}>
                                    <span>-</span>
                                    <input type="number" min="0" id="gv-${match.id}" value="${vVal}" ${disableAttr}>
                                </div>
                                ${infoPenales}
                            </div>
                        </div>
                    `;
                });
                divFase += `</div>`;
                fixtureContainer.innerHTML += divFase;
            });

            actualizarLeaderboard();
        }

        async function guardarProde() {
            const btn = document.getElementById('btn-save');
            btn.innerText = "⏳ Sincronizando en la nube...";
            btn.disabled = true;

            await descargarDatos();

            if (!baseDeDatosCompleta[clienteActual]) {
                baseDeDatosCompleta[clienteActual] = { password: passwordActual, pronosticos: {} };
            }

            multiWebsMatches.forEach(match => {
                if (match.yaJugado) return;

                const inputL = document.getElementById(`gl-${match.id}`).value;
                const inputV = document.getElementById(`gv-${match.id}`).value;

                if (inputL !== "" && inputV !== "") {
                    baseDeDatosCompleta[clienteActual].pronosticos[match.id] = {
                        l: parseInt(inputL),
                        v: parseInt(inputV)
                    };
                }
            });

            await subirDatos();
            
            btn.innerText = "✅ ¡GUARDADO CON ÉXITO!";
            setTimeout(() => {
                btn.innerText = "💾 GUARDAR MIS RESULTADOS";
                btn.disabled = false;
            }, 2000);

            renderizarFixture();
        }

        function actualizarLeaderboard() {
            const containerTabla = document.getElementById('ranking-rows');
            containerTabla.innerHTML = "";
            
            let listaFamiliares = Object.keys(baseDeDatosCompleta);
            
            if(listaFamiliares.length === 0) {
                containerTabla.innerHTML = "<tr><td colspan='3'>Nadie ingresó todavía</td></tr>";
                return;
            }

            listaFamiliares.forEach((nombreFamiliar, index) => {
                const esPropio = nombreFamiliar === clienteActual ? 'style="color: var(--secondary); font-weight: bold;"' : '';
                containerTabla.innerHTML += `
                    <tr ${esPropio}>
                        <td>${index + 1}</td>
                        <td>${nombreFamiliar}</td>
                        <td>0 Pts</td>
                    </tr>
                `;
            });
        }

        function cerrarSesion() {
            localStorage.removeItem('prode_secure_user');
            localStorage.removeItem('prode_secure_pass');
            window.location.reload();
        }
    </script>
</body>
</html>
