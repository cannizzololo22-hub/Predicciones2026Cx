<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixture 2026 Mundial - Prode Sincronizado</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #10b981;
            --dark-bg: #0b0f19;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --live-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-main);
            min-height: 100vh;
        }

        /* Pantalla de Entrada */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e3a8a 0%, var(--dark-bg) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-box {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 420px;
            width: 90%;
            border: 1px solid #334155;
        }

        .login-box h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .login-box p {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .login-box input {
            width: 100%;
            padding: 0.9rem;
            margin-bottom: 1rem;
            border: 2px solid #334155;
            background: #0f172a;
            color: white;
            border-radius: 8px;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
        }

        .login-box button {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 0.9rem;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 0.5rem;
        }

        /* Contenedor Principal */
        #main-interface {
            display: none;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #334155;
            margin-bottom: 2rem;
        }

        .clock-bar {
            font-size: 0.9rem;
            color: #fff;
            background: #1e293b;
            padding: 0.4rem 1rem;
            border-radius: 8px;
            font-weight: bold;
            border: 1px solid #334155;
            margin-top: 0.5rem;
            display: inline-block;
        }

        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 1024px) {
            .grid { grid-template-columns: 1fr; }
        }

        .panel {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 1.5rem;
            border: 1px solid #334155;
            margin-bottom: 2rem;
        }

        .panel h3 {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--primary);
            padding-left: 0.6rem;
        }

        /* Tarjetas En Vivo */
        .live-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .live-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 1px solid var(--live-color);
            padding: 1.25rem;
            border-radius: 10px;
        }

        .live-badge {
            background: var(--live-color);
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            animation: blink 1.5s infinite;
            display: inline-block;
            margin-bottom: 0.5rem;
        }

        @keyframes blink { 50% { opacity: 0.4; } }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .score-display {
            font-size: 1.6rem;
            color: var(--live-color);
            letter-spacing: 4px;
        }

        /* Estructura de Filas */
        .fase-bloque { margin-top: 2rem; }
        .fase-nombre { background: linear-gradient(90deg, #1e3a8a, #2563eb); padding: 0.7rem 1rem; font-weight: bold; border-radius: 8px; margin-bottom: 1rem; color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .partido-fila { display: flex; justify-content: space-between; align-items: center; background: #0f172a; padding: 1rem; border-radius: 8px; margin-bottom: 0.6rem; border: 1px solid #1e293b; }
        .partido-fila.jugado { border-left: 5px solid #64748b; opacity: 0.85; }
        .partido-meta { font-size: 0.8rem; color: #94a3b8; width: 140px; font-weight: bold; }
        .partido-equipos { flex-grow: 1; font-weight: bold; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; }
        .equipo-txt { width: 43%; }
        .equipo-txt.local { text-align: right; }
        .equipo-txt.visitante { text-align: left; }
        .vs-lbl { color: var(--text-muted); font-size: 0.85rem; width: 14%; text-align: center; background: #1e293b; padding: 0.1rem 0.4rem; border-radius: 4px; }
        .partido-inputs input { width: 45px; height: 35px; text-align: center; background: #1e293b; border: 1px solid #475569; color: white; font-size: 1.1rem; font-weight: bold; border-radius: 6px; outline: none; }
        .partido-inputs input:focus { border-color: var(--secondary); }
        .partido-inputs input:disabled { background: #334155; border-color: #475569; color: #cbd5e1; cursor: not-allowed; }
        .penales-lbl { font-size: 0.75rem; color: #f59e0b; display: block; text-align: center; font-weight: bold; margin-top: 2px; }

        /* Ranking */
        .ranking-table { width: 100%; border-collapse: collapse; }
        .ranking-table th, .ranking-table td { padding: 0.8rem; text-align: left; border-bottom: 1px solid #334155; }
        .btn-submit { background: var(--secondary); color: white; border: none; padding: 1.2rem; font-size: 1.2rem; font-weight: bold; border-radius: 8px; width: 100%; cursor: pointer; margin-top: 1.5rem; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 0.3rem 0.8rem; font-size: 0.85rem; border-radius: 6px; cursor: pointer; margin-top: 5px; font-weight: bold; }
        .reset-btn { background: #475569; color: #cbd5e1; border: none; padding: 0.4rem; font-size: 0.75rem; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 10px; font-weight: bold; }
        .reset-btn:hover { background: #ef4444; color: white; }
    </style>
</head>

            { id: "p26", fase: "Cuartos de Final", local: "Ganador Octavos 19", visitante: "Ganador Octavos 20", fecha: "10 Jul", hora: "19:00", yaJugado: false },
            { id: "p27", fase: "Cuartos de Final", local: "Ganador Octavos 21", visitante: "Ganador Octavos 22", fecha: "11 Jul", hora: "15:00", yaJugado: false },
            { id: "p28", fase: "Cuartos de Final", local: "Ganador Octavos 23", visitante: "Ganador Octavos 24", fecha: "11 Jul", hora: "19:00", yaJugado: false },

            const clockEl = document.getElementById('live-clock');
            if (clockEl) clockEl.innerText = `🕒 Hora Actual: ${txtHora}`;
        }, 1000);

        async function consultarAPIEnvivo() {
            partidosEnVivoPorAPI = ["p14"]; 
            cargarDatosNube(); // Sincroniza desde la nube
        }

        window.onload = function() {
            const userGuardado = localStorage.getItem('mundial_sesion_usuario');
            if (userGuardado && userGuardado !== "undefined" && userGuardado.trim() !== "") {
                clienteActual = userGuardado.trim().toUpperCase();
                ejecutarAccesoValido();
            }
        }

        async function procesarLogin() {
            const alias = document.getElementById('player-name').value.trim().toUpperCase();
            const pass = document.getElementById('player-pass').value.trim();

            if (!alias || !pass) return alert("Por favor completá tu Nombre y Contraseña.");

            // Traemos los datos directamente desde Supabase en la nube
            let { data: usuario } = await _supabase.from('prode_usuarios').select('*').eq('username', alias).maybeSingle();

            if (usuario) {
                if (usuario.password !== pass) {
                    return alert("❌ Contraseña incorrecta para este usuario.");
                }
            } else {
                // Si no existe, lo creamos de forma automática en la nube
                await _supabase.from('prode_usuarios').insert([{ username: alias, password: pass, pronosticos: {} }]);
            }

            clienteActual = alias;
            localStorage.setItem('mundial_sesion_usuario', clienteActual);
            ejecutarAccesoValido();
        }

        function ejecutarAccesoValido() {
            document.getElementById('user-display').innerText = `👤 Jugador: ${clienteActual}`;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-interface').style.display = 'block';
            
            consultarAPIEnvivo();
            setInterval(consultarAPIEnvivo, 8000); 
        }

        async function cargarDatosNube() {
            let DB_Mock = {};
            let { data: todos } = await _supabase.from('prode_usuarios').select('*');
            
            if (todos) {
                todos.forEach(u => { 
                    DB_Mock[u.username] = { password: u.password, pronosticos: u.pronosticos || {} }; 
                });
            }
            construirEstructuraYRenderizar(DB_Mock);
        }

        function construirEstructuraYRenderizar(DB) {
            const liveContainer = document.getElementById('live-panel-container');
            const fixtureContainer = document.getElementById('fixture-container');
            
            liveContainer.innerHTML = "";
            fixtureContainer.innerHTML = "";

            let misPredicciones = DB[clienteActual]?.pronosticos || {};
            let fasesMap = {};

            multiWebsMatches.forEach(match => {
                let estaLiveReal = partidosEnVivoPorAPI.includes(match.id);

                const predSavedL = misPredicciones[match.id]?.l;
                const predSavedV = misPredicciones[match.id]?.v;
                const tienePrediccion = (predSavedL !== undefined && predSavedL !== null && predSavedL !== "");

                if (estaLiveReal) {
                    let apiGolesL = 1; 
                    let apiGolesV = 1;

                    let textStatus = !tienePrediccion 
                        ? `<span style="color: #f59e0b; font-weight: bold;">⏳ No cargaste predicción (Cerrada por estar En Vivo)</span>`
                        : `Tu predicción guardada: <b style="color: var(--secondary);">${predSavedL} - ${predSavedV}</b>`;

                    liveContainer.innerHTML += `
                        <div class="live-card">
                            <span class="live-badge">EN VIVO REAL (API)</span>
                            <div class="scoreboard">
                                <span>${match.local}</span>
                                <span class="score-display">${apiGolesL} - ${apiGolesV}</span>
                                <span>${match.visitante}</span>
                            </div>
                            <div style="margin-top:0.5rem; font-size:0.85rem; border-top:1px dashed #334155; padding-top:0.5rem;">${textStatus}</div>
                        </div>
                    `;
                }

                if (!fasesMap[match.fase]) fasesMap[match.fase] = [];
                fasesMap[match.fase].push({ ...match, estaLiveReal });
            });

            if (liveContainer.innerHTML === "") {
                liveContainer.innerHTML = `<p style="color: var(--text-muted); font-size:0.9rem; padding: 0.5rem;">Ningún partido en juego actualmente.</p>`;
            }

            const ordenFases = ["Dieciseisavos de Final", "Octavos de Final", "Cuartos de Final", "Semifinales", "¡Gran Final del Mundial! 🏆"];

            ordenFases.forEach(fase => {
                if (!fasesMap[fase]) return;
                let divFase = `<div class="fase-bloque"><div class="fase-nombre">${fase}</div>`;
                
                fasesMap[fase].forEach(match => {
                    let lVal = misPredicciones[match.id]?.l ?? "";
                    let vVal = misPredicciones[match.id]?.v ?? "";

                    const isFrozen = (match.yaJugado || match.estaLiveReal) ? "disabled" : "";
                    const claseFila = match.yaJugado ? "partido-fila jugado" : "partido-fila";
                    
                    let textoMeta = "⏳ PENDIENTE";
                    if (match.yaJugado) textoMeta = "✅ FINALIZADO";
                    else if (match.estaLiveReal) textoMeta = "🔴 EN VIVO (BLOQUEADO)";

                    const infoPenales = match.penales ? `<span class="penales-lbl">${match.penales}</span>` : "";

                    divFase += `
                        <div class="${claseFila}">
                            <div class="partido-meta">📅 ${match.fecha}<br>⏰ ${match.hora} HS<br>${textoMeta}</div>
                            <div class="partido-equipos">
                                <div class="equipo-txt local">${match.local}</div>
                                <span class="vs-lbl">VS</span>
                                <div class="equipo-txt visitante">${match.visitante}</div>
                            </div>
                            <div>
                                <div class="partido-inputs">
                                    <input type="number" min="0" id="gl-${match.id}" value="${lVal}" ${isFrozen}>
                                    <span style="color: var(--text-muted)">-</span>
                                    <input type="number" min="0" id="gv-${match.id}" value="${vVal}" ${isFrozen}>
                                </div>
                                ${infoPenales}
                            </div>
                        </div>
                    `;
                });
                divFase += `</div>`;
                fixtureContainer.innerHTML += divFase;
            });

            procesarPosicionesAmigos(DB);
        }

        async function guardarProde() {
            // Traemos el estado más actual del usuario de la nube para no pisar nada
            let { data: actual } = await _supabase.from('prode_usuarios').select('pronosticos').eq('username', clienteActual).single();
            let pronosticosNuevos = actual?.pronosticos || {};

            multiWebsMatches.forEach(match => {
                let estaLiveReal = partidosEnVivoPorAPI.includes(match.id);
                if (!match.yaJugado && !estaLiveReal) {
                    const inputL = document.getElementById(`gl-${match.id}`).value;
                    const inputV = document.getElementById(`gv-${match.id}`).value;

                    if (inputL !== "" && inputV !== "") {
                        pronosticosNuevos[match.id] = {
                            l: parseInt(inputL),
                            v: parseInt(inputV)
                        };
                    }
                }
            });

            // Guardamos directamente en la nube
            await _supabase.from('prode_usuarios').update({ pronosticos: pronosticosNuevos }).eq('username', clienteActual);
            
            const btn = document.getElementById('btn-save');
            btn.innerText = "✅ ¡Guardado con Éxito!";
            btn.style.background = "#059669";
            
            setTimeout(() => {
                btn.innerText = "💾 Guardar Mis Predicciones";
                btn.style.background = "var(--secondary)";
            }, 2000);

            consultarAPIEnvivo();
        }

        function procesarPosicionesAmigos(DB) {
            let leaderboard = [];

            Object.keys(DB).forEach(key => {
                if (key === "undefined" || key === "" || key === "mundial_sesion_usuario") return;
                
                let cuenta = DB[key];
                if (cuenta && typeof cuenta === "object") {
                    let scoreCalculado = 0;
                    let prediccionesDeAmigo = cuenta.pronosticos || {};

                    multiWebsMatches.forEach(match => {
                        if (match.yaJugado && match.realL !== null && match.realV !== null && prediccionesDeAmigo[match.id]) {
                            const predL = prediccionesDeAmigo[match.id].l;
                            const predV = prediccionesDeAmigo[match.id].v;

                            if (predL === match.realL && predV === match.realV) {
                                scoreCalculado += 10;
                            } else if ((predL > predV && match.realL > match.realV) || 
                                     (predL < predV && match.realL < match.realV) || 
                                     (predL === predV && match.realL === match.realV)) {
                                scoreCalculado += 5;
                            }
                        }
                    });

                    leaderboard.push({ name: key, score: scoreCalculado });
                }
            });

            leaderboard.sort((a, b) => b.score - a.score);

            const containerTabla = document.getElementById('ranking-rows');
            if (containerTabla) {
                containerTabla.innerHTML = "";
                
                if (leaderboard.length === 0) {
                    containerTabla.innerHTML = "<tr><td colspan='3' style='text-align:center;color:var(--text-muted);padding:10px;'>Ningún amigo registrado todavía</td></tr>";
                } else {
                    leaderboard.forEach((jugador, i) => {
                        const esPropio = jugador.name === clienteActual ? 'style="color: var(--secondary); font-weight: bold; background: rgba(16, 185, 129, 0.1);"' : '';
                        containerTabla.innerHTML += `
                            <tr ${esPropio}>
                                <td><b>${i + 1}</b></td>
                                <td>${jugador.name}</td>
                                <td><b>${jugador.score} Pts</b></td>
                            </tr>
                        `;
                    });
                }
            }
        }

        async function limpiarCacheTotal() {
            if (confirm("¿Querés vaciar las predicciones de la nube y reiniciar la base?")) {
                let { data: todos } = await _supabase.from('prode_usuarios').select('username');
                if (todos) {
                    for (let u of todos) {
                        await _supabase.from('prode_usuarios').update({ pronosticos: {} }).eq('username', u.username);
                    }
                }
                localStorage.clear();
                window.location.reload();
            }
        }

        function cerrarSesion() {
            localStorage.removeItem('mundial_sesion_usuario');
            clienteActual = "";
            window.location.reload();
        }
    </script>
</body>
