<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prode Mundial 2026 Completo</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0b0f19; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: #1e293b; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        input { width: 50px; background: #0f172a; color: #fff; border: 1px solid #475569; text-align: center; }
        button { background: #10b981; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="login" class="card">
        <h3>Login</h3>
        <input type="text" id="user" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Clave">
        <button onclick="entrar()">Entrar</button>
    </div>

    <div id="main" style="display:none;">
        <h2>Fixture 2026</h2>
        <div id="fixture"></div>
        <button onclick="guardar()">Guardar Pronósticos</button>
        <div id="ranking" class="card" style="margin-top:20px;"></div>
    </div>

    <script>
        const _supabase = supabase.createClient(
            "https://jkctgynvmoykickwfcwc.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImprY3RneW52bW95a2lja3dmY3djIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTcyOTYwMDAsImV4cCI6MjAyODg1MjAwMH0.1_R6_h9Xg4bBvL9_mR7f7wYJ5k8Z9x0_wR3_j5X8_bQ"
        );

        let uActual = "";
        const matches = [
            { id: "p1", local: "Alemania", vis: "Paraguay" }, { id: "p2", local: "Francia", vis: "Suecia" },
            { id: "p3", local: "Sudáfrica", vis: "Canadá" }, { id: "p4", local: "Países Bajos", vis: "Marruecos" },
            { id: "p5", local: "Portugal", vis: "Croacia" }, { id: "p6", local: "España", vis: "Austria" },
            { id: "p7", local: "EE.UU.", vis: "Bosnia" }, { id: "p8", local: "Bélgica", vis: "Senegal" },
            { id: "p9", local: "Brasil", vis: "Japón" }, { id: "p10", local: "C. Marfil", vis: "Noruega" },
            { id: "p11", local: "México", vis: "Ecuador" }, { id: "p12", local: "Inglaterra", vis: "R.D. Congo" },
            { id: "p13", local: "Argentina", vis: "Cabo Verde" }, { id: "p14", local: "Australia", vis: "Egipto" },
            { id: "p15", local: "Suiza", vis: "Argelia" }, { id: "p16", local: "Colombia", vis: "Ghana" },
            { id: "p17", local: "Paraguay", vis: "Francia" }, { id: "p18", local: "Canadá", vis: "Marruecos" },
            { id: "p19", local: "Portugal", vis: "España" }, { id: "p20", local: "EE.UU.", vis: "Bélgica" },
            { id: "p21", local: "Brasil", vis: "Noruega" }, { id: "p22", local: "México", vis: "Inglaterra" },
            { id: "p23", local: "ARG/CV", vis: "AUS/EGI" }, { id: "p24", local: "Suiza", vis: "COL/GHA" },
            { id: "p25", local: "Cuartos 1", vis: "Cuartos 2" }, { id: "p26", local: "Cuartos 3", vis: "Cuartos 4" },
            { id: "p27", local: "Cuartos 5", vis: "Cuartos 6" }, { id: "p28", local: "Cuartos 7", vis: "Cuartos 8" },
            { id: "p29", local: "Semis 1", vis: "Semis 2" }, { id: "p30", local: "Semis 3", vis: "Semis 4" },
            { id: "p32", local: "FINAL", vis: "FINAL" }
        ];

        async function entrar() {
            uActual = document.getElementById('user').value.toUpperCase();
            let pass = document.getElementById('pass').value;
            let { data } = await _supabase.from('prode_usuarios').select('*').eq('username', uActual).maybeSingle();
            
            if (!data) {
                await _supabase.from('prode_usuarios').insert({username: uActual, password: pass, pronosticos: {}});
            } else if (data.password !== pass) return alert("Clave mal");

            document.getElementById('login').style.display = 'none';
            document.getElementById('main').style.display = 'block';
            renderFixture(data ? data.pronosticos : {});
        }

        function renderFixture(pronos) {
            let html = "";
            matches.forEach(m => {
                let p = pronos[m.id] || {l:"", v:""};
                html += `<div>${m.local} <input id="l-${m.id}" value="${p.l}"> - <input id="v-${m.id}" value="${p.v}"> ${m.vis}</div>`;
            });
            document.getElementById('fixture').innerHTML = html;
        }

        async function guardar() {
            let pronos = {};
            matches.forEach(m => {
                pronos[m.id] = { l: document.getElementById('l-'+m.id).value, v: document.getElementById('v-'+m.id).value };
            });
            await _supabase.from('prode_usuarios').update({pronosticos: pronos}).eq('username', uActual);
            alert("Guardado!");
        }
    </script>
</body>
</html>
