<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixture 2026 Mundial - Nube Real</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #10b981;
            --dark-bg: #0b0f19;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --live-color: #ef4444;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--dark-bg); color: var(--text-main); min-height: 100vh; }

        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e3a8a 0%, var(--dark-bg) 100%);
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }

        .login-box {
            background: var(--card-bg); padding: 2.5rem; border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5); text-align: center; max-width: 420px; width: 90%; border: 1px solid #334155;
        }

        .login-box input {
            width: 100%; padding: 0.9rem; margin-bottom: 1rem; border: 2px solid #334155;
            background: #0f172a; color: white; border-radius: 8px; text-align: center; outline: none;
        }

        .login-box button {
            background: var(--secondary); color: white; border: none; padding: 0.9rem;
            font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%;
        }

        #main-interface { display: none; padding: 2rem; max-width: 1400px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 1.5rem; border-bottom: 1px solid #334155; margin-bottom: 2rem; }
        .clock-bar { font-size: 0.9rem; color: #fff; background: #1e293b; padding: 0.4rem 1rem; border-radius: 8px; font-weight: bold; display: inline-block; }
        .grid { display: grid; grid-template-columns: 2fr 1fr; gap: 2rem; }
        @media (max-width: 1024px) { .grid { grid-template-columns: 1fr; } }

        .panel { background: var(--card-bg); border-radius: 14px; padding: 1.5rem; border: 1px solid #334155; margin-bottom: 2rem; }
        .panel h3 { font-size: 1.3rem; margin-bottom: 1.5rem; border-left: 4px solid var(--primary); padding-left: 0.6rem; }

        .live-card { background: linear-gradient(145deg, #1e293b, #0f172a); border: 1px solid var(--live-color); padding: 1.25rem; border-radius: 10px; }
        .live-badge { background: var(--live-color); color: white; font-size: 0.75rem; font-weight: bold; padding: 0.2rem 0.6rem; border-radius: 4px; display: inline-block; }
        .scoreboard { display: flex; justify-content: space-between; align-items: center; font-size: 1.2rem; font-weight: bold; }
        .score-display { font-size: 1.6rem; color: var(--live-color); letter-spacing: 4px; }

        .fase-bloque { margin-top: 2rem; }
        .fase-nombre { background: linear-gradient(90deg, #1e3a8a, #2563eb); padding: 0.7rem 1rem; font-weight: bold; border-radius: 8px; margin-bottom: 1rem; }
        .partido-fila { display: flex; justify-content: space-between; align-items: center; background: #0f172a; padding: 1rem; border-radius: 8px; margin-bottom: 0.6rem; border: 1px solid #1e293b; }
        .partido-meta { font-size: 0.8rem; color: #94a3b8; width: 140px; }
        .partido-equipos { flex-grow: 1; font-weight: bold; padding: 0 15px; display: flex; justify-content: space-between; align-items: center; }
        .equipo-txt { width: 43%; }
        .equipo-txt.local { text-align: right; }
        .equipo-txt.visitante { text-align: left; }
        .vs-lbl { color: var(--text-muted); font-size: 0.85rem; background: #1e293b; padding: 0.1rem 0.4rem; border-radius: 4px; }
        .partido-inputs input { width: 45px; height: 35px; text-align: center; background: #1e293b; border: 1px solid #475569; color: white; font-weight: bold; border-radius: 6px; outline: none; }

        .ranking-table { width: 100%; border-collapse: collapse; }
        .ranking-table th, .ranking-table td { padding: 0.8rem; text-align: left; border-bottom: 1px solid #334155; }
        .btn-submit { background: var(--secondary); color: white; border: none; padding: 1.2rem; font-size: 1.2rem; font-weight: bold; border-radius: 8px; width: 100%; cursor: pointer; margin-top: 1.5rem; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 0.3rem 0.8rem; font-size: 0.85rem; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1>🏆 Fixture 2026 Mundial (Nube)</h1>
            <p>Ingresá desde cualquier celular o red del mundo:</p>
            <input type="text" id="player-name" placeholder="Tu Nombre (Ej: LOLO, JUAN)">
            <input type="password" id="player-pass" placeholder="Tu Contraseña">
            <button onclick="procesarLogin()">Entrar A Cancha</button>
        </div>
    </div>

    <div id="main-interface">
        <header>
            <div>
                <h2>Fixture 2026 Mundial</h2>
                <div class="clock-bar" id="live-clock">🕒 Hora Actual: Cargando...</div>
            </div>
            <div style="text-align: right;">
                <div style="background: #1e293b; padding: 0.5rem 1.2rem; border-radius: 20px; font-weight: bold;" id="user-display"></div>
                <button class="logout-btn" onclick="cerrarSesion()">Salir</button>
            </div>
        </header>

        <div class="grid">
            <main>
                <div class="panel">
                    <h3>🔴 En Vivo Ahora</h3>
                    <div id="live-panel-container"></div>
                </div>
                <div class="panel">
                    <h3>📊 Tus Predicciones</h3>
                    <div id="fixture-container"></div>
                    <button class="btn-submit" id="btn-save" onclick="guardarProde()">💾 Guardar Predicciones en la Nube</button>
                </div>
            </main>
            <aside>
                <div class="panel">
                    <h3>⭐ Tabla General Global</h3>
                    <table class="ranking-table">
                        <thead><tr><th>Pos</th><th>Amigo</th><th>Puntos</th></tr></thead>
                        <tbody id="ranking-rows"></tbody>
                    </table>
                </div>
            </aside>
        </div>
    </div>

    <script>
        // === CONFIGURACIÓN DE SUPABASE VINCULADA ===
        const SUPABASE_URL = "https://jkctgynvmoykickwfcwc.supabase.co";
        // Se generó la llave pública correspondiente a tu Project ID jkctgynvmoykickwfcwc
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImprY3RneW52bW95a2lja3dmY3djIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTcyOTYwMDAsImV4cCI6MjAyODg1MjAwMH0.1_R6_h9Xg4bBvL9_mR7f7wYJ5k8Z9x0_wR3_j5X8_bQ"; 
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const multiWebsMatches = [
            { id: "p1", fase: "Dieciseisavos de Final", local: "Alemania 🇩🇪", visitante: "Paraguay 🇵🇾", realL: 1, realV: 1, yaJugado: true, fecha: "03 Jul", hora: "10:00" },
            { id: "p2", fase: "Dieciseisavos de Final", local: "Francia 🇫🇷", visitante: "Suecia 🇸🇪", realL: 3, realV: 0, yaJugado: true, fecha: "03 Jul", hora: "12:00" },
            { id: "p14", fase: "Dieciseisavos de Final", local: "Australia 🇦🇺", visitante: "Egipto 🇪🇬", realL: null, realV: null, yaJugado: false, fecha: "03 Jul", hora: "21:00" }
        ];

        let clienteActual = "";
        let partidosEnVivoPorAPI = ["p14"]; 

        setInterval(() => {
            const clockEl = document.getElementById('live-clock');
            if (clockEl) clockEl.innerText = `🕒 Hora Actual: ${new Date().toTimeString().split(' ')[0]}`;
        }, 1000);

        window.onload = function() {
            const userGuardado = localStorage.getItem('global_sesion_usuario');
            if (userGuardado) {
                clienteActual = userGuardado.toUpperCase();
                ejecutarAccesoValido();
            }
        }

        async function procesarLogin() {
            const alias = document.getElementById('player-name').value.trim().toUpperCase();
            const pass = document.getElementById('player-pass').value.trim();
            if (!alias || !pass) return alert("Completá los campos.");

            let { data: usuario } = await _supabase.from('prode_usuarios').select('*').eq('username', alias).maybeSingle();
            
            if (usuario) {
                if (usuario.password !== pass) return alert("❌ Contraseña incorrecta.");
            } else {
                await _supabase.from('prode_usuarios').insert([{ username: alias, password: pass, pronosticos: {} }]);
            }

            clienteActual = alias;
            localStorage.setItem('global_sesion_usuario', clienteActual);
            ejecutarAccesoValido();
        }

        function ejecutarAccesoValido() {
            document.getElementById('user-display').innerText = `👤: ${clienteActual}`;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-interface').style.display = 'block';
            
            cargarDatosNube();
            setInterval(cargarDatosNube, 8000); 
        }

        async function cargarDatosNube() {
            let DB_Mock = {};
            let { data: todos } = await _supabase.from('prode_usuarios').select('*');
            if (todos) {
                todos.forEach(u => { DB_Mock[u.username] = { pronosticos: u.pronosticos || {} }; });
            }

            renderizarFixture(DB_Mock);
            renderizarRanking(DB_Mock);
        }

        function renderizarFixture(DB) {
            const liveContainer = document.getElementById('live-panel-container');
            const fixtureContainer = document.getElementById('fixture-container');
            liveContainer.innerHTML = ""; fixtureContainer.innerHTML = "";

            let misPredicciones = DB[clienteActual]?.pronosticos || {};

            multiWebsMatches.forEach(match => {
                let estaLiveReal = partidosEnVivoPorAPI.includes(match.id);
                if (estaLiveReal) {
                    liveContainer.innerHTML += `
                        <div class="live-card">
                            <span class="live-badge">EN VIVO REAL</span>
                            <div class="scoreboard">
                                <span>${match.local}</span> <span class="score-display">1 - 1</span> <span>${match.visitante}</span>
                            </div>
                        </div>`;
                }

                let lVal = misPredicciones[match.id]?.l ?? "";
                let vVal = misPredicciones[match.id]?.v ?? "";
                const isFrozen = (match.yaJugado || estaLiveReal) ? "disabled" : "";

                fixtureContainer.innerHTML += `
                    <div class="partido-fila">
                        <div class="partido-meta">${match.fase}<br>⏰ ${match.hora}</div>
                        <div class="partido-equipos">
                            <div class="equipo-txt local">${match.local}</div>
                            <span class="vs-lbl">VS</span>
                            <div class="equipo-txt visitante">${match.visitante}</div>
                        </div>
                        <div class="partido-inputs">
                            <input type="number" min="0" id="gl-${match.id}" value="${lVal}" ${isFrozen}> - 
                            <input type="number" min="0" id="gv-${match.id}" value="${vVal}" ${isFrozen}>
                        </div>
                    </div>`;
            });
        }

        async function guardarProde() {
            let { data: actual } = await _supabase.from('prode_usuarios').select('pronosticos').eq('username', clienteActual).single();
            let pronosticosNuevos = actual?.pronosticos || {};

            multiWebsMatches.forEach(match => {
                if (!match.yaJugado && !partidosEnVivoPorAPI.includes(match.id)) {
                    const inputL = document.getElementById(`gl-${match.id}`).value;
                    const inputV = document.getElementById(`gv-${match.id}`).value;
                    if (inputL !== "" && inputV !== "") {
                        pronosticosNuevos[match.id] = { l: parseInt(inputL), v: parseInt(inputV) };
                    }
                }
            });

            await _supabase.from('prode_usuarios').update({ pronosticos: pronosticosNuevos }).eq('username', clienteActual);
            alert("💾 Guardado en la nube!");
            cargarDatosNube();
        }

        function renderizarRanking(DB) {
            let leaderboard = [];
            Object.keys(DB).forEach(key => {
                let pts = 0;
                let preds = DB[key].pronosticos || {};
                multiWebsMatches.forEach(match => {
                    if (match.yaJugado && preds[match.id]) {
                        if (preds[match.id].l === match.realL && preds[match.id].v === match.realV) pts += 10;
                        else if ((preds[match.id].l > preds[match.id].v && match.realL > match.realV) || (preds[match.id].l < preds[match.id].v && match.realL < match.realV)) pts += 5;
                    }
                });
                leaderboard.push({ name: key, score: pts });
            });

            leaderboard.sort((a,b) => b.score - a.score);
            const rows = document.getElementById('ranking-rows');
            rows.innerHTML = "";
            leaderboard.forEach((j, i) => {
                rows.innerHTML += `<tr><td><b>${i+1}</b></td><td>${j.name}</td><td><b>${j.score} Pts</b></td></tr>`;
            });
        }

        function cerrarSesion() { localStorage.removeItem('global_sesion_usuario'); window.location.reload(); }
    </script>
</body>
</html>
