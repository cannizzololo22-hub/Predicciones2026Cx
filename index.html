<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixture 2026 Mundial</title>
    <style>
        :root {
            --primary: #2563eb;
            --secondary: #10b981;
            --dark-bg: #0b0f19;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --live-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-main);
            min-height: 100vh;
        }

        /* Pantalla de Entrada */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1e3a8a 0%, var(--dark-bg) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .login-box {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 420px;
            width: 90%;
            border: 1px solid #334155;
        }

        .login-box h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }

        .login-box p {
            color: var(--text-muted);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .login-box input {
            width: 100%;
            padding: 0.9rem;
            margin-bottom: 1rem;
            border: 2px solid #334155;
            background: #0f172a;
            color: white;
            border-radius: 8px;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
        }

        .login-box button {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 0.9rem;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 0.5rem;
        }
        .login-box button:disabled { background: #475569; cursor: not-allowed; }

        /* Contenedor Principal */
        #main-interface {
            display: none;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #334155;
            margin-bottom: 2rem;
        }

        .clock-bar {
            font-size: 0.9rem;
            color: #fff;
            background: #1e293b;
            padding: 0.4rem 1rem;
            border-radius: 8px;
            font-weight: bold;
            border: 1px solid #334155;
            margin-top: 0.5rem;
            display: inline-block;
        }

        .grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 1024px) {
            .grid { grid-template-columns: 1fr; }
        }

        .panel {
            background: var(--card-bg);
            border-radius: 14px;
            padding: 1.5rem;
            border: 1px solid #334155;
            margin-bottom: 2rem;
        }

        .panel h3 {
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            border-left: 4px solid var(--primary);
            padding-left: 0.6rem;
        }

        /* Tarjetas En Vivo */
        .live-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .live-card {
            background: linear-gradient(145deg, #1e293b, #0f172a);
            border: 1px solid var(--live-color);
            padding: 1.25rem;
            border-radius: 10px;
        }

        .live-badge {
            background: var(--live-color);
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            animation: blink 1.5s infinite;
            display: inline-block;
            margin-bottom: 0.5rem;
        }

        @keyframes blink { 50% { opacity: 0.4; } }

        .scoreboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .score-display {
            font-size: 1.6rem;
            color: var(--live-color);
            letter-spacing: 4px;
        }

        /* Estructura de Filas */
        .fase-bloque { margin-top: 2rem; }
        .fase-nombre { background: #334155; padding: 0.6rem 1rem; font-weight: bold; border-radius: 6px; margin-bottom: 1rem; }
        .partido-fila { display: flex; justify-content: space-between; align-items: center; background: #0f172a; padding: 1rem; border-radius: 8px; margin-bottom: 0.6rem; border: 1px solid #1e293b; }
        .partido-meta { font-size: 0.8rem; color: #94a3b8; width: 140px; }
        .partido-equipos { flex-grow: 1; font-weight: 500; padding: 0 15px; }
        .partido-inputs input { width: 45px; height: 35px; text-align: center; background: #1e293b; border: 1px solid #475569; color: white; font-size: 1rem; border-radius: 6px; outline: none; }
        .partido-inputs input:focus { border-color: var(--secondary); }
        .partido-inputs input:disabled { background: #090d16; border-color: #1e293b; color: #64748b; cursor: not-allowed; }

        /* Ranking */
        .ranking-table { width: 100%; border-collapse: collapse; }
        .ranking-table th, .ranking-table td { padding: 0.8rem; text-align: left; border-bottom: 1px solid #334155; }
        .btn-submit { background: var(--secondary); color: white; border: none; padding: 1rem; font-size: 1.1rem; font-weight: bold; border-radius: 8px; width: 100%; cursor: pointer; margin-top: 1.5rem; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3); }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 0.3rem 0.8rem; font-size: 0.85rem; border-radius: 6px; cursor: pointer; margin-top: 5px; font-weight: bold; }
        #login-msg { margin-top: 10px; font-weight: bold; color: #f59e0b; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h1>🏆 Fixture 2026 Mundial</h1>
            <p>Ingresá tu usuario y contraseña familiar para guardar predicciones:</p>
            <input type="text" id="player-name" placeholder="Tu Nombre (Ej: LOLO, JUAN)">
            <input type="password" id="player-pass" placeholder="Tu Contraseña Secreta">
            <button id="btn-login" onclick="procesarLogin()">Entrar A Cancha</button>
            <div id="login-msg"></div>
        </div>
    </div>

    <div id="main-interface">
        <header>
            <div>
                <h2>Fixture 2026 Mundial</h2>
                <div class="clock-bar" id="live-clock">Hora del Sistema: Cargando...</div>
            </div>
            <div style="text-align: right;">
                <div style="background: #1e293b; padding: 0.5rem 1.2rem; border-radius: 20px; font-weight: bold;" id="user-display"></div>
                <button class="logout-btn" onclick="cerrarSesion()">Cerrar Sesión / Cambiar</button>
            </div>
        </header>

        <div class="grid">
            <main>
                <div class="panel">
                    <h3>🔴 En Vivo Ahora (Verificado por Horario Oficial)</h3>
                    <div class="live-grid" id="live-panel-container"></div>
                </div>

                <div class="panel">
                    <h3>📊 Armá tus Clasificaciones</h3>
                    <div id="fixture-container"></div>
                    <button class="btn-submit" id="btn-save" onclick="guardarProde()">💾 Guardar Predicciones</button>
                </div>
            </main>

            <aside>
                <div class="panel">
                    <h3>⭐ Tabla de Posiciones General</h3>
                    <table class="ranking-table">
                        <thead><tr><th>Pos</th><th>Amigo</th><th>Puntos</th></tr></thead>
                        <tbody id="ranking-rows"></tbody>
                    </table>
                </div>
            </aside>
        </div>
    </div>

    <script>
        const multiWebsMatches = [
            { id: "p1", fase: "16avos de Final", local: "Argentina", visitante: "Cabo Verde", fecha: "03 Jul", hora: "19:00", golesL: 2, golesV: 1 },
            { id: "p2", fase: "16avos de Final", local: "Colombia", visitante: "Ghana", fecha: "03 Jul", hora: "22:00", golesL: 1, golesV: 0 },
            { id: "p3", fase: "Octavos de Final", local: "Canadá", visitante: "Marruecos", fecha: "04 Jul", hora: "14:00", golesL: null, golesV: null },
            { id: "p4", fase: "Octavos de Final", local: "Paraguay", visitante: "Francia", fecha: "04 Jul", hora: "18:00", golesL: null, golesV: null },
            { id: "p5", fase: "Cuartos de Final", local: "Sin Definir", visitante: "Sin Definir", fecha: "09 Jul", hora: "15:00", golesL: null, golesV: null },
            { id: "p6", fase: "Semifinal", local: "Sin Definir", visitante: "Sin Definir", fecha: "14 Jul", hora: "20:00", golesL: null, golesV: null },
            { id: "p7", fase: "Gran Final 🏆", local: "Sin Definir", visitante: "Sin Definir", fecha: "19 Jul", hora: "17:00", golesL: null, golesV: null }
        ];

        const DB_URL = "https://kvdb.io/MN9vC63w1g6L3rN96WdF7a/prode_mundial_v25";
        let clienteActual = "";
        let passwordActual = "";
        let baseDeDatosCompleta = {};

        window.onload = async function() {
            // El reloj ahora SOLO cambia el texto de la hora, NO borra los inputs ni redibuja la pantalla
            setInterval(() => {
                const ahora = new Date();
                document.getElementById('live-clock').innerText = `🕒 Hora Actual: ${ahora.toTimeString().split(' ')[0]}`;
            }, 1000);

            const userGuardado = localStorage.getItem('mundial_secure_user');
            const passGuardado = localStorage.getItem('mundial_secure_pass');
            
            if (userGuardado && passGuardado) {
                clienteActual = userGuardado.toUpperCase();
                passwordActual = passGuardado;
                document.getElementById('login-msg').innerText = "⏳ Conectando automáticamente...";
                await descargarDatos();
                ejecutarAccesoValido();
            }
        }

        async function descargarDatos() {
            try {
                let respuesta = await fetch(DB_URL);
                if (respuesta.ok) {
                    let texto = await respuesta.text();
                    baseDeDatosCompleta = texto ? JSON.parse(texto) : {};
                } else {
                    baseDeDatosCompleta = {};
                }
            } catch (e) {
                baseDeDatosCompleta = {};
            }
        }

        async function subirDatos() {
            try {
                await fetch(DB_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(baseDeDatosCompleta)
                });
            } catch (e) {
                console.error("Error al guardar en la nube", e);
            }
        }

        async function procesarLogin() {
            const alias = document.getElementById('player-name').value.trim().toUpperCase();
            const pass = document.getElementById('player-pass').value.trim();

            if (!alias || !pass) return alert("Por favor completá tu Nombre y Contraseña.");

            const btn = document.getElementById('btn-login');
            btn.disabled = true;
            document.getElementById('login-msg').innerText = "🔒 Validando cuenta en la nube...";

            await descargarDatos();

            if (baseDeDatosCompleta[alias]) {
                if (baseDeDatosCompleta[alias].password !== pass) {
                    alert("❌ Error: Este usuario ya está registrado y la contraseña es incorrecta.");
                    document.getElementById('login-msg').innerText = "";
                    btn.disabled = false;
                    return;
                }
            } else {
                baseDeDatosCompleta[alias] = {
                    password: pass,
                    pronosticos: {}
                };
                await subirDatos();
            }

            clienteActual = alias;
            passwordActual = pass;
            localStorage.setItem('mundial_secure_user', clienteActual);
            localStorage.setItem('mundial_secure_pass', passwordActual);

            ejecutarAccesoValido();
        }

        function ejecutarAccesoValido() {
            document.getElementById('user-display').innerText = `👤 Jugador: ${clienteActual}`;
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-interface').style.display = 'block';
            evaluarEstadosYRenderizar();
        }

        function evaluarEstadosYRenderizar() {
            const ahora = new Date();
            const horaActualStr = ahora.getHours().toString().padStart(2, '0') + ":" + ahora.getMinutes().toString().padStart(2, '0');
            
            const liveContainer = document.getElementById('live-panel-container');
            const fixtureContainer = document.getElementById('fixture-container');
            
            liveContainer.innerHTML = "";
            fixtureContainer.innerHTML = "";

            let misPredicciones = baseDeDatosCompleta[clienteActual]?.pronosticos || {};
            let fasesMap = {};

            multiWebsMatches.forEach(match => {
                // Validación de partidos En Vivo (solo si es 3 de Julio y pasó el horario)
                let estaLive = false;
                if (match.fecha === "03 Jul" && horaActualStr >= match.hora) {
                    estaLive = true;
                }

                const predSavedL = misPredicciones[match.id]?.l;
                const predSavedV = misPredicciones[match.id]?.v;
                const tienePrediccion = (predSavedL !== undefined && predSavedL !== null && predSavedL !== "");

                if (estaLive) {
                    let textStatus = !tienePrediccion 
                        ? `<span style="color: var(--live-color); font-weight: bold;">⚠️ No lo predeciste (Bloqueado)</span>`
                        : `Tu predicción enviada: <b style="color: var(--secondary);">${predSavedL} - ${predSavedV}</b>`;

                    liveContainer.innerHTML += `
                        <div class="live-card">
                            <span class="live-badge">EN VIVO</span>
                            <div class="scoreboard">
                                <span>${match.local}</span>
                                <span class="score-display">${match.golesL} - ${match.golesV}</span>
                                <span>${match.visitante}</span>
                            </div>
                            <div style="margin-top:0.5rem; font-size:0.85rem; border-top:1px dashed #334155; padding-top:0.5rem;">${textStatus}</div>
                        </div>
                    `;
                }

                if (!fasesMap[match.fase]) fasesMap[match.fase] = [];
                fasesMap[match.fase].push({ ...match, estaLive });
            });

            if (liveContainer.innerHTML === "") {
                liveContainer.innerHTML = `<p style="color: var(--text-muted); font-size:0.9rem; padding: 0.5rem;">Ningún partido de hoy ha comenzado aún según el horario oficial.</p>`;
            }

            for (const fase in fasesMap) {
                let divFase = `<div class="fase-bloque"><div class="fase-nombre">${fase}</div>`;
                
                fasesMap[fase].forEach(match => {
                    const lVal = misPredicciones[match.id]?.l ?? "";
                    const vVal = misPredicciones[match.id]?.v ?? "";
                    const isFrozen = match.estaLive ? "disabled" : "";

                    divFase += `
                        <div class="partido-fila">
                            <div class="partido-meta">📅 ${match.fecha}<br>⏰ ${match.hora} HS</div>
                            <div class="partido-equipos">${match.local} vs. ${match.visitante}</div>
                            <div class="partido-inputs">
                                <input type="number" min="0" id="gl-${match.id}" value="${lVal}" ${isFrozen}>
                                <span style="color: var(--text-muted)">:</span>
                                <input type="number" min="0" id="gv-${match.id}" value="${vVal}" ${isFrozen}>
                            </div>
                        </div>
                    `;
                });
                divFase += `</div>`;
                fixtureContainer.innerHTML += divFase;
            }

            procesarPosicionesAmigos();
        }

        async function guardarProde() {
            const btn = document.getElementById('btn-save');
            btn.innerText = "⏳ Sincronizando en la nube...";
            btn.disabled = true;

            await descargarDatos();

            if (!baseDeDatosCompleta[clienteActual]) {
                baseDeDatosCompleta[clienteActual] = { password: passwordActual, pronosticos: {} };
            }

            const ahora = new Date();
            const horaActualStr = ahora.getHours().toString().padStart(2, '0') + ":" + ahora.getMinutes().toString().padStart(2, '0');

            multiWebsMatches.forEach(match => {
                let estaLive = (match.fecha === "03 Jul" && horaActualStr >= match.hora);
                
                if (!estaLive) {
                    const inputL = document.getElementById(`gl-${match.id}`).value;
                    const inputV = document.getElementById(`gv-${match.id}`).value;

                    if (inputL !== "" && inputV !== "") {
                        baseDeDatosCompleta[clienteActual].pronosticos[match.id] = {
                            l: parseInt(inputL),
                            v: parseInt(inputV)
                        };
                    }
                }
            });

            await subirDatos();
            
            btn.innerText = "✅ ¡GUARDADO CON ÉXITO!";
            setTimeout(() => {
                btn.innerText = "💾 Guardar Predicciones";
                btn.disabled = false;
            }, 2000);

            evaluarEstadosYRenderizar();
        }

        function procesarPosicionesAmigos() {
            let leaderboard = [];
            const ahora = new Date();
            const horaActualStr = ahora.getHours().toString().padStart(2, '0') + ":" + ahora.getMinutes().toString().padStart(2, '0');

            for (const nombreAmigo in baseDeDatosCompleta) {
                let scoreCalculado = 0;
                let prediccionesDeAmigo = baseDeDatosCompleta[nombreAmigo].pronosticos || {};

                multiWebsMatches.forEach(match => {
                    let estaLive = (match.fecha === "03 Jul" && horaActualStr >= match.hora);
                    if (estaLive && prediccionesDeAmigo[match.id]) {
                        const predL = prediccionesDeAmigo[match.id].l;
                        const predV = prediccionesDeAmigo[match.id].v;

                        if (predL === match.golesL && predV === match.golesV) {
                            scoreCalculado += 10; // Pleno
                        } else if ((predL > predV && match.golesL > match.golesV) || 
                                 (predL < predV && match.golesL < match.golesV) || 
                                 (predL === predV && match.golesL === match.golesV)) {
                            scoreCalculado += 5; // Acertar resultado sin goles exactos
                        }
                    }
                });

                leaderboard.push({ name: nombreAmigo, score: scoreCalculado });
            }

            // Ordena el ranking de mayor a menor puntuación
            leaderboard.sort((a, b) => b.score - a.score);

            const containerTabla = document.getElementById('ranking-rows');
            containerTabla.innerHTML = "";
            
            if (leaderboard.length === 0) {
                containerTabla.innerHTML = "<tr><td colspan='3'>Nadie ingresó todavía</td></tr>";
                return;
            }

            leaderboard.forEach((jugador, i) => {
                const esPropio = jugador.name === clienteActual ? 'style="color: var(--secondary); font-weight: bold;"' : '';
                containerTabla.innerHTML += `
                    <tr ${esPropio}>
                        <td>${i + 1}</td>
                        <td>${jugador.name}</td>
                        <td>${jugador.score} Pts</td>
                    </tr>
                `;
            });
        }

        function cerrarSesion() {
            localStorage.removeItem('mundial_secure_user');
            localStorage.removeItem('mundial_secure_pass');
            window.location.reload();
        }
    </script>
</body>
</html>
